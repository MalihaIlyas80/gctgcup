# GC-TGCUP — joint train + edit-aware decode (accuracy-focused, faster eval).
project_name: "GC-TGCUP"

data:
  raw_dir: "cup2_dataset"
  processed_dir: "data/processed"
  max_samples: 20000
  train_ratio: 0.8
  valid_ratio: 0.1
  long_comment_threshold: 25
  min_comment_len: 3
  seed: 42
  vocab_max_size: 15000

model:
  hidden_dim: 256
  num_heads: 8
  num_encoder_layers: 4
  num_decoder_layers: 4
  ggnn_steps: 6
  dropout: 0.2
  graphcodebert: "microsoft/graphcodebert-base"
  freeze_graphcodebert: false
  edit_weight: 5.0              # sequence-diff loss on changed comment tokens
  det_loss_weight: 0.15
  upd_loss_weight: 0.85
  beam_size: 5
  max_decode_len: 50
  det_threshold: 0.5

training:
  two_stage: false              # joint: detection + update together (proven BLEU path)
  detection_epochs: 6           # only if two_stage: true
  update_epochs: 14               # joint epochs (~1.2h on Kaggle T4)
  batch_size: 8
  max_valid_batches: 8          # faster validation (~640 samples)
  valid_beam_size: 5            # match final eval beam
  pos_oversample: 2.5           # oversample outdated comments in training
  learning_rate: 3.0e-4
  graphcodebert_lr: 2.0e-5
  weight_decay: 0.01
  patience: 5
  grad_accumulation_steps: 4
  checkpoint_dir: "checkpoints"
  pos_weight: 2.5

evaluation:
  tgcup_baseline:
    accuracy: 30.29
    recall_at_5: 38.36
    gleu: 60.64
    meteor: 56.58
    sari: 57.23
    bleu: 76.68
