# GC-TGCUP — Kaggle GPU config (target: BEAT TG-CUP on 20k data).
project_name: "GC-TGCUP"

data:
  raw_dir: "cup2_dataset"
  processed_dir: "data/processed"
  max_samples: 20000
  train_ratio: 0.8
  valid_ratio: 0.1
  test_ratio: 0.1
  max_code_len: 256
  max_comment_len: 128
  max_edit_len: 512
  long_comment_threshold: 25
  min_comment_len: 3
  seed: 42

model:
  hidden_dim: 256
  dropout: 0.2
  graphcodebert: "microsoft/graphcodebert-base"
  freeze_graphcodebert: true       # free GPU for larger CodeT5-base updater
  # Larger pretrained updater — main lever to beat TG-CUP exact-match / BLEU.
  update_model: "Salesforce/codet5-base"
  max_src_len: 512
  max_tgt_len: 128
  max_edit_chars: 400
  max_ast_chars: 200
  det_loss_weight: 0.15            # focus training on UPDATE quality
  upd_loss_weight: 0.85
  beam_size: 5
  max_decode_len: 128
  det_threshold: 0.5

training:
  batch_size: 4                    # codet5-base + GraphCodeBERT on T4
  update_epochs: 20
  max_valid_batches: 15
  learning_rate: 3.0e-4
  graphcodebert_lr: 1.0e-5
  update_lr: 2.0e-5
  weight_decay: 0.01
  patience: 8
  grad_accumulation_steps: 8       # effective batch = 32
  device: "auto"
  checkpoint_dir: "checkpoints"
  pos_weight: 2.5

evaluation:
  metrics: [accuracy, recall_at_5, gleu, meteor, sari, bleu]
  detection_metrics: [accuracy, precision, recall, f1]
  tgcup_baseline:
    accuracy: 30.29
    recall_at_5: 38.36
    gleu: 60.64
    meteor: 56.58
    sari: 57.23
    bleu: 76.68
