# GC-TGCUP — ONE-SHOT Kaggle run (20k, beat TG-CUP on outdated-only eval).
# GGNN + GraphCodeBERT + hybrid edit decode (rule + neural fusion).
project_name: "GC-TGCUP"

data:
  raw_dir: "cup2_dataset"
  processed_dir: "data/processed"
  max_samples: 20000
  train_ratio: 0.8
  valid_ratio: 0.1
  long_comment_threshold: 25
  min_comment_len: 3
  seed: 42
  vocab_max_size: 18000        # dst tokens first — better exact-match coverage

model:
  hidden_dim: 256
  num_heads: 8
  num_encoder_layers: 4
  num_decoder_layers: 4
  ggnn_steps: 6                  # TG-CUP AST-diff GGNN (mandatory)
  dropout: 0.2
  graphcodebert: "microsoft/graphcodebert-base"
  freeze_graphcodebert: false    # fine-tune (mandatory thesis)
  edit_weight: 4.0               # sequence-diff on changed comment tokens
  det_loss_weight: 0.12
  upd_loss_weight: 0.88
  beam_size: 5                   # inference default (keep eval fast)
  max_decode_len: 64
  det_threshold: 0.5

training:
  two_stage: false
  detection_epochs: 6
  update_epochs: 16
  batch_size: 8
  max_valid_batches: 8           # ~640 val samples — ~5 min/epoch valid
  valid_beam_size: 3             # greedy-ish valid; final eval uses beam 5
  pos_oversample: 4.0            # 4x outdated samples — small-data TG-CUP beat
  learning_rate: 3.0e-4
  graphcodebert_lr: 2.0e-5
  weight_decay: 0.01
  patience: 5
  grad_accumulation_steps: 4
  checkpoint_dir: "checkpoints"
  pos_weight: 2.5

evaluation:
  beam_size: 5                   # full test ~45-60 min T4; NOT beam 10 (~2-3 hr)
  max_batches: null              # null = full test; set 63 for ~15 min quick eval
  tgcup_baseline:
    accuracy: 30.29
    recall_at_5: 38.36
    gleu: 60.64
    meteor: 56.58
    sari: 57.23
    bleu: 76.68
