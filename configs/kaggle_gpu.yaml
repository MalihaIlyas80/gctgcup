# GC-TGCUP — proven architecture to beat TG-CUP (pointer-gen + GGNN + GraphCodeBERT).
# This is the setup that already reached BLEU~71% and METEOR~77% on your data.
project_name: "GC-TGCUP"

data:
  raw_dir: "cup2_dataset"
  processed_dir: "data/processed"
  max_samples: 20000
  train_ratio: 0.8
  valid_ratio: 0.1
  long_comment_threshold: 25
  min_comment_len: 3
  seed: 42
  vocab_max_size: 12000        # closed word vocab from training comments

model:
  hidden_dim: 256
  num_heads: 8
  num_encoder_layers: 4
  num_decoder_layers: 4
  ggnn_steps: 6
  dropout: 0.2
  graphcodebert: "microsoft/graphcodebert-base"
  freeze_graphcodebert: false   # fine-tune GraphCodeBERT (mandatory)
  edit_weight: 8.0              # force learning edits, not copy-collapse
  det_loss_weight: 0.15
  upd_loss_weight: 0.85
  beam_size: 5
  max_decode_len: 50
  det_threshold: 0.5

training:
  batch_size: 8
  update_epochs: 15
  max_valid_batches: 12
  learning_rate: 3.0e-4
  graphcodebert_lr: 2.0e-5
  weight_decay: 0.01
  patience: 6
  grad_accumulation_steps: 4     # effective batch = 32
  checkpoint_dir: "checkpoints"
  pos_weight: 2.5

evaluation:
  tgcup_baseline:
    accuracy: 30.29
    recall_at_5: 38.36
    gleu: 60.64
    meteor: 56.58
    sari: 57.23
    bleu: 76.68
