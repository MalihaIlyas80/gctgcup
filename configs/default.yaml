# GC-TGCUP: GraphCodeBERT-enhanced Two-Stage Comment Update (beats TG-CUP gaps)
project_name: "GC-TGCUP"

data:
  raw_dir: "cup2_dataset"
  processed_dir: "data/processed"
  max_samples: 10000
  train_ratio: 0.8
  valid_ratio: 0.1
  test_ratio: 0.1
  max_code_len: 256
  max_comment_len: 128
  max_edit_len: 512
  long_comment_threshold: 25   # tokens – triggers long-comment subgroup metric
  min_comment_len: 3
  seed: 42
  vocab_max_size: 16000        # byte-level BPE vocab size (no OOV)

model:
  hidden_dim: 128              # halved: 4x less compute in attention layers
  num_heads: 4                 # must divide hidden_dim
  num_encoder_layers: 2        # halved
  num_decoder_layers: 2        # halved
  ggnn_steps: 4                # reduced from 6
  dropout: 0.3
  graphcodebert: "microsoft/graphcodebert-base"
  freeze_graphcodebert: true   # freeze BERT: biggest single CPU speedup
  beam_size: 5
  max_decode_len: 50
  det_threshold: 0.5           # detection decision threshold

training:
  batch_size: 8
  detection_epochs: 15
  update_epochs: 15
  max_valid_batches: 100
  learning_rate: 2.0e-4
  graphcodebert_lr: 1.0e-5
  weight_decay: 0.05
  patience: 5
  grad_accumulation_steps: 4   # effective batch = 8x4 = 32
  device: "auto"
  checkpoint_dir: "checkpoints"
  pos_weight: 2.33             # neg/pos ratio ~70/30 from det_accuracy=70% baseline

evaluation:
  metrics:
    - accuracy
    - recall_at_5
    - gleu
    - meteor
    - sari
    - bleu
  detection_metrics:
    - accuracy
    - precision
    - recall
    - f1
  tgcup_baseline:
    accuracy: 30.29
    recall_at_5: 38.36
    gleu: 60.64
    meteor: 56.58
    sari: 57.23
    bleu: 76.68
